name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest --cov=spatial_index_advisor --cov-report=term-missing

      # --fail-on never: the shipped workload deliberately contains critical
      # findings, so the default exit status 2 is the correct behaviour, not a
      # CI failure. This step checks the command runs, not what it concludes.
      - name: Check the advisor runs on every shipped workload format
        run: |
          set -euo pipefail
          for workload in examples/pg_stat_statements.csv \
                          examples/postgresql-2026-07-14.csv \
                          examples/queries.sql; do
            echo "--- $workload"
            python -m spatial_index_advisor analyze \
              -w "$workload" -c examples/catalog.json \
              -f json --fail-on never > /dev/null
          done

  # The job above never touches a database: the engine runs from a JSON snapshot,
  # which is what keeps it fast. That leaves `collect` and the emitted DDL
  # untested, and both depend on the PostgreSQL major version -- collect reads
  # system catalogs whose columns and semantics move between releases, and four
  # silent bugs turned up there the first time it met a real server. This job
  # covers that gap on every supported version.
  #
  # SCOPE: correctness only -- snapshot fidelity and DDL validity. It asserts
  # nothing about the cost model's numeric estimates. Those are heuristic figures
  # in arbitrary PostgreSQL cost units, and the wall-clock timings needed to
  # calibrate them are far too noisy on a shared runner to assert on without the
  # job becoming flaky. This is not a benchmark; do not add timing assertions.
  live:
    name: live (postgis ${{ matrix.postgis }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        postgis: ["14-3.3", "15-3.4", "16-3.4", "17-3.5", "18-3.6"]
    services:
      postgis:
        image: postgis/postgis:${{ matrix.postgis }}
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: advisor
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d advisor"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      # requirements.txt already pins psycopg[binary], which is all `collect`
      # needs. The advisor itself is run from the checkout, not installed.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      # The schema, the assertions and the workload live in the script so they
      # can be run by hand against any DSN, not just in CI.
      - name: Verify collect and the emitted DDL against a live server
        run: |
          python tests/live/verify_against_server.py \
            --dsn "postgresql://postgres:postgres@localhost:5432/advisor"
